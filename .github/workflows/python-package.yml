name: CI_TEST

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: # allow manual run

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_version: ${{ steps.version.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
      is_fork: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Harden Runner
      uses: ./.github/actions/harden-runner
      with:
        extra-endpoints: |
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443

    - name: Calculate image version from Dockerfile & plugins.txt
      id: version
      run: |
        HASH=$(sha256sum docker/Dockerfile docker/plugins.txt | sha256sum | cut -c1-8)
        echo "version=$HASH" >> "$GITHUB_OUTPUT"
        echo "Image version: $HASH"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      id: push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: docker
        push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        load: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
        tags: ghcr.io/${{ github.repository_owner }}/jenkinsapi-systest:${{ steps.version.outputs.version }}

    - name: Export Docker image (fork fallback)
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
      run: docker save jenkinsapi-systest:latest | gzip > /tmp/jenkinsapi-systest.tar.gz

    - name: Upload Docker image artifact (fork fallback)
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: docker-image
        path: /tmp/jenkinsapi-systest.tar.gz
        retention-days: 1

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Harden Runner
      uses: ./.github/actions/harden-runner
      with:
        extra-endpoints: |
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443

    - name: Setup Python
      uses: ./.github/actions/setup-python

    - name: Lint with ruff
      run: |
        uv run ruff check jenkinsapi/ --output-format full

  build:
    needs: [build-docker-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with requires-python and classifiers in pyproject.toml
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Harden Runner
      uses: ./.github/actions/harden-runner
      with:
        extra-endpoints: |
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443

    - name: Setup Python
      uses: ./.github/actions/setup-python
      with:
        python-version: ${{ matrix.python-version }}

    - name: Log in to GHCR
      if: needs.build-docker-image.outputs.is_fork != 'true'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull Jenkins image
      if: needs.build-docker-image.outputs.is_fork != 'true'
      run: |
        IMAGE="ghcr.io/${{ github.repository_owner }}/jenkinsapi-systest@${{ needs.build-docker-image.outputs.image_digest }}"
        docker pull "$IMAGE"
        docker tag "$IMAGE" jenkinsapi-systest:latest

    - name: Download Docker image artifact (fork fallback)
      if: needs.build-docker-image.outputs.is_fork == 'true'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image
        path: /tmp

    - name: Load Docker image (fork fallback)
      if: needs.build-docker-image.outputs.is_fork == 'true'
      run: docker load < /tmp/jenkinsapi-systest.tar.gz

    - name: Test with pytest
      run: |
        NUM_WORKERS=auto
        echo "Running full test suite with xdist mode '$NUM_WORKERS' ($(nproc) CPUs available)"
        uv run pytest -sv -n $NUM_WORKERS --tb=short \
          --cov=jenkinsapi --cov-report=term-missing --cov-report=xml \
          --junit-xml=test-results.xml \
          jenkinsapi_tests

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results-py${{ matrix.python-version }}
        path: test-results.xml
