name: CI_TEST

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch: # allow manual run

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit
        # azure.archive.ubuntu.com:80           - Ubuntu apt packages
        # esm.ubuntu.com:443                    - Ubuntu ESM security updates
        # files.pythonhosted.org:443            - Python package downloads
        # ftp-chi.osuosl.org:443                - Python mirror fallback (Chicago)
        # ftp-nyc.osuosl.org:443                - Python mirror fallback (NYC)
        # github.com:443                        - Git operations / Actions
        # api.github.com:443                    - GitHub API
        # int.api.stepsecurity.io:443           - harden-runner telemetry
        # mirror.xmission.com:443               - Python mirror fallback (Utah)
        # motd.ubuntu.com:443                   - Ubuntu MOTD
        # packages.microsoft.com:443            - Microsoft apt repo (ubuntu-latest runner)
        # ppa.launchpadcontent.net:443          - Ubuntu PPA
        # pypi.org:443                          - PyPI package index
        # objects.githubusercontent.com:443     - GitHub release artifacts / LFS
        allowed-endpoints: >
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          objects.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        sudo apt-get update; sudo apt-get install libkrb5-dev gcc

    - name: Lint with ruff
      run: |
        uv run ruff check jenkinsapi/ --output-format full

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit
        # azure.archive.ubuntu.com:80           - Ubuntu apt packages
        # esm.ubuntu.com:443                    - Ubuntu ESM security updates
        # files.pythonhosted.org:443            - Python package downloads
        # ftp-chi.osuosl.org:443                - Python mirror fallback (Chicago)
        # ftp-nyc.osuosl.org:443                - Python mirror fallback (NYC)
        # github.com:443                        - Git operations / Actions
        # api.github.com:443                    - GitHub API
        # int.api.stepsecurity.io:443           - harden-runner telemetry
        # mirror.xmission.com:443               - Python mirror fallback (Utah)
        # motd.ubuntu.com:443                   - Ubuntu MOTD
        # packages.microsoft.com:443            - Microsoft apt repo (ubuntu-latest runner)
        # ppa.launchpadcontent.net:443          - Ubuntu PPA
        # pypi.org:443                          - PyPI package index
        # objects.githubusercontent.com:443     - GitHub release artifacts / LFS
        allowed-endpoints: >
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          objects.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        sudo apt-get update; sudo apt-get install libkrb5-dev gcc

    - name: Prepare Docker image
      uses: ./.github/actions/docker-image-prep
      with:
        image_name: ghcr.io/${{ github.repository_owner }}/jenkinsapi

    - name: Test with pytest
      run: |
        NUM_WORKERS=auto
        echo "Running full test suite with xdist mode '$NUM_WORKERS' ($(nproc) CPUs available)"
        uv run pytest -sv -n $NUM_WORKERS --cov=jenkinsapi --cov-report=term-missing --cov-report=xml jenkinsapi_tests

  test-macos:
    # macOS: runs full suite (unit + systests) using Docker via Colima.
    # Tests Python 3.10 (min supported) and 3.13 (latest stable).
    # The Jenkins image may run under Rosetta 2 emulation on Apple Silicon
    # if the GHCR image doesn't include an arm64 variant; docker-image-prep
    # will build locally in that case.
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install Kerberos (macOS)
      run: |
        brew install krb5
        KRB5_PREFIX=$(brew --prefix krb5)
        echo "PKG_CONFIG_PATH=${KRB5_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
        echo "KRB5_CONFIG=${KRB5_PREFIX}/etc/krb5.conf" >> "$GITHUB_ENV"

    - name: Set up Docker (macOS via Colima)
      uses: crazy-max/ghaction-setup-docker@v3
      with:
        version: v27.3.1
        daemon-config: |
          {
            "features": {
              "containerd-snapshotter": true
            }
          }

    - name: Install project dependencies
      run: uv sync --all-groups

    - name: Prepare Docker image
      uses: ./.github/actions/docker-image-prep
      with:
        image_name: ghcr.io/${{ github.repository_owner }}/jenkinsapi

    - name: Test with pytest (macOS)
      run: |
        uv run pytest -sv -n auto --cov=jenkinsapi --cov-report=term-missing --cov-report=xml jenkinsapi_tests

  test-windows:
    # Windows: runs unit tests unconditionally; attempts systests by switching
    # Docker Desktop to Linux container mode. The systest step uses
    # continue-on-error because Linux container support on Windows CI can be
    # unstable — failures are informational until the setup is validated.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install MIT Kerberos (Windows)
      # requests-kerberos uses Windows SSPI (winkerberos) on Windows, but
      # MIT Kerberos is still required for the build-time dependency resolution.
      run: choco install -y mitkerberos --no-progress
      shell: pwsh

    - name: Install project dependencies
      run: uv sync --all-groups
      shell: pwsh

    - name: Unit tests (Windows)
      run: |
        uv run pytest -sv -n auto --cov=jenkinsapi --cov-report=term-missing `
          jenkinsapi_tests/unittests/ -m "not docker"
      shell: pwsh

    - name: Switch Docker to Linux container mode
      # Windows runners ship Docker Desktop in Windows-container mode.
      # Switch to Linux containers so we can run the Jenkins image.
      run: |
        & "$Env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine
        # Wait for Docker daemon to restart in Linux mode
        $retries = 0
        do {
          Start-Sleep -Seconds 5
          $retries++
          $status = docker info 2>&1
        } while ($LASTEXITCODE -ne 0 -and $retries -lt 12)
        if ($LASTEXITCODE -ne 0) { Write-Error "Docker Linux mode failed to start" }
      shell: pwsh

    - name: Prepare Docker image (Windows)
      uses: ./.github/actions/docker-image-prep
      with:
        image_name: ghcr.io/${{ github.repository_owner }}/jenkinsapi
      continue-on-error: true

    - name: System tests (Windows)
      # continue-on-error: Linux containers on Windows CI can be unstable;
      # treat failures as informational until the setup is fully validated.
      continue-on-error: true
      run: |
        uv run pytest -sv -n auto --cov=jenkinsapi --cov-report=term-missing `
          jenkinsapi_tests/systests/
      shell: pwsh
