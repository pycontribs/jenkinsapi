name: CI_TEST

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual run

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        sudo apt-get update; sudo apt-get install libkrb5-dev gcc

    - name: Lint with ruff
      run: |
        uv run ruff check jenkinsapi/ --output-format full

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit
        allowed-endpoints: >
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          objects.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        sudo apt-get update; sudo apt-get install libkrb5-dev gcc

    - name: Test with make
      shell: bash
      run: |
        make gha-test NUM_WORKERS="$(uv run python -c 'import os; print(os.cpu_count())')"

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Configure Docker Linux engine
      shell: pwsh
      run: |
        $dockerCliCandidates = @(
          "$env:ProgramFiles\Docker\Docker\DockerCli.exe",
          "$env:ProgramW6432\Docker\Docker\DockerCli.exe",
          "$env:ProgramFiles\Docker\Docker\resources\DockerCli.exe",
          "$env:ProgramW6432\Docker\Docker\resources\DockerCli.exe"
        )
        $dockerCli = $dockerCliCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

        $dockerService = Get-Service -Name docker -ErrorAction SilentlyContinue
        if ($dockerService -and $dockerService.Status -ne "Running") {
          Start-Service docker
        }

        $desktopService = Get-Service -Name com.docker.service -ErrorAction SilentlyContinue
        if ($desktopService -and $desktopService.Status -ne "Running") {
          Start-Service com.docker.service
        }

        if ($dockerCli) {
          Write-Host "Switching Docker engine using $dockerCli"
          & $dockerCli -SwitchLinuxEngine
        } else {
          Write-Warning "DockerCli.exe not found; continuing with current Docker engine"
        }

        $env:DOCKER_DEFAULT_PLATFORM = "linux/amd64"
        [Environment]::SetEnvironmentVariable("DOCKER_DEFAULT_PLATFORM", "linux/amd64", "Machine")

        for ($i = 0; $i -lt 30; $i++) {
          try {
            docker version
            break
          } catch {
            if ($i -eq 29) {
              throw "Docker daemon did not become available"
            }
            Start-Sleep -Seconds 2
          }
        }

    - name: Test with make
      shell: bash
      run: |
        make gha-test NUM_WORKERS="$(uv run python -c 'import os; print(os.cpu_count())')"

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        brew install krb5 colima docker qemu
        echo "PKG_CONFIG_PATH=$(brew --prefix krb5)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

    - name: Configure Docker daemon
      shell: bash
      run: |
        set -euo pipefail
        colima delete -f || true
        if ! colima start --runtime docker --cpu 4 --memory 8 --disk 20 --vm-type=vz; then
          echo "colima vz startup failed, retrying with qemu"
          colima delete -f || true
          colima start --runtime docker --cpu 4 --memory 8 --disk 20 --vm-type=qemu
        fi
        docker context use colima
        docker version

    - name: Dump Colima logs on failure
      if: failure()
      shell: bash
      run: |
        set +e
        for f in "$HOME/.colima/_lima/colima/ha.stderr.log" "$HOME/.colima/_lima/colima/ha.log" "$HOME/.colima/_lima/colima/serial.log"; do
          if [ -f "$f" ]; then
            echo "===== $f ====="
            cat "$f"
          fi
        done

    - name: Test with make
      shell: bash
      run: |
        make gha-test NUM_WORKERS="$(uv run python -c 'import os; print(os.cpu_count())')"
