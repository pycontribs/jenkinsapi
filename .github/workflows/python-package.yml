name: CI_TEST

on:
  push:
    branches: [ "master" ]
    paths:
      - '**.py'
      - '**.yml'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # allow manual run

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libkrb5-dev gcc

    - name: Set up uv
      uses: astral-sh/setup-uv@v3

    - name: Lint with ruff
      run: |
        uv run ruff check jenkinsapi/ --output-format full

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up uv
      uses: astral-sh/setup-uv@v3

    - name: Cache uv installation
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libkrb5-dev gcc

    - name: Pull Jenkins Docker image
      run: docker pull ghcr.io/pycontribs/jenkinsapi-jenkins:latest || true
      continue-on-error: true

    - name: Test with pytest (parallel)
      run: uv run pytest -sv -n $(python3 -c "import os; print(max(1, os.cpu_count() // 3))") --cov=jenkinsapi --cov-report=term-missing --cov-report=xml jenkinsapi_tests
