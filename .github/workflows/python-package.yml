name: CI_TEST

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: # allow manual run

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit
        allowed-endpoints: >
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Calculate image version from Dockerfile & plugins.txt
      id: version
      run: |
        HASH=$(sha256sum docker/Dockerfile docker/plugins.txt | sha256sum | cut -c1-8)
        echo "version=$HASH" >> "$GITHUB_OUTPUT"
        echo "Image version: $HASH"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: docker
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/jenkinsapi:${{ steps.version.outputs.version }}
        labels: |
          org.opencontainers.image.source=${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/jenkinsapi:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/jenkinsapi:buildcache,mode=max

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit
        # azure.archive.ubuntu.com:80           - Ubuntu apt packages
        # esm.ubuntu.com:443                    - Ubuntu ESM security updates
        # files.pythonhosted.org:443            - Python package downloads
        # ftp-chi.osuosl.org:443                - Python mirror fallback (Chicago)
        # ftp-nyc.osuosl.org:443                - Python mirror fallback (NYC)
        # github.com:443                        - Git operations / Actions
        # api.github.com:443                    - GitHub API
        # int.api.stepsecurity.io:443           - harden-runner telemetry
        # mirror.xmission.com:443               - Python mirror fallback (Utah)
        # motd.ubuntu.com:443                   - Ubuntu MOTD
        # packages.microsoft.com:443            - Microsoft apt repo (ubuntu-latest runner)
        # ppa.launchpadcontent.net:443          - Ubuntu PPA
        # pypi.org:443                          - PyPI package index
        # objects.githubusercontent.com:443     - GitHub release artifacts / LFS
        allowed-endpoints: >
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          objects.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Install python
      run: uv python install

    - name: Lint with ruff
      run: |
        uv run ruff check jenkinsapi/ --output-format full

  build:
    needs: build-docker-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with requires-python and classifiers in pyproject.toml
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit
        # azure.archive.ubuntu.com:80           - Ubuntu apt packages
        # esm.ubuntu.com:443                    - Ubuntu ESM security updates
        # files.pythonhosted.org:443            - Python package downloads
        # ftp-chi.osuosl.org:443                - Python mirror fallback (Chicago)
        # ftp-nyc.osuosl.org:443                - Python mirror fallback (NYC)
        # github.com:443                        - Git operations / Actions
        # api.github.com:443                    - GitHub API
        # int.api.stepsecurity.io:443           - harden-runner telemetry
        # mirror.xmission.com:443               - Python mirror fallback (Utah)
        # motd.ubuntu.com:443                   - Ubuntu MOTD
        # packages.microsoft.com:443            - Microsoft apt repo (ubuntu-latest runner)
        # ppa.launchpadcontent.net:443          - Ubuntu PPA
        # pypi.org:443                          - PyPI package index
        # objects.githubusercontent.com:443     - GitHub release artifacts / LFS
        allowed-endpoints: >
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          ftp-chi.osuosl.org:443
          ftp-nyc.osuosl.org:443
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          mirror.xmission.com:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          objects.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install python
      run: uv python install

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull built Docker image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/jenkinsapi:${{ needs.build-docker-image.outputs.image_version }}
        docker tag ghcr.io/${{ github.repository_owner }}/jenkinsapi:${{ needs.build-docker-image.outputs.image_version }} jenkinsapi-systest:latest

    - name: Test with pytest
      run: |
        NUM_WORKERS=auto
        echo "Running full test suite with xdist mode '$NUM_WORKERS' ($(nproc) CPUs available)"
        uv run pytest -sv -n $NUM_WORKERS --tb=short \
          --cov=jenkinsapi --cov-report=term-missing --cov-report=xml \
          --junit-xml=test-results.xml \
          jenkinsapi_tests

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results-py${{ matrix.python-version }}
        path: test-results.xml
