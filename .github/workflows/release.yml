name: Release

on:
  release:
    types: [published]

permissions:
    contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          # azure.archive.ubuntu.com:80           - Ubuntu apt packages
          # esm.ubuntu.com:443                    - Ubuntu ESM security updates
          # files.pythonhosted.org:443            - Python package downloads
          # github.com:443                        - Git operations / Actions
          # api.github.com:443                    - GitHub API
          # int.api.stepsecurity.io:443           - harden-runner telemetry
          # motd.ubuntu.com:443                   - Ubuntu MOTD
          # packages.microsoft.com:443            - Microsoft apt repo (ubuntu-latest runner)
          # ppa.launchpadcontent.net:443          - Ubuntu PPA
          # pypi.org:443                          - PyPI package index
          # objects.githubusercontent.com:443     - GitHub release artifacts / LFS
          allowed-endpoints: >
            azure.archive.ubuntu.com:80
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            api.github.com:443
            int.api.stepsecurity.io:443
            motd.ubuntu.com:443
            packages.microsoft.com:443
            ppa.launchpadcontent.net:443
            pypi.org:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          sudo apt-get update; sudo apt-get install libkrb5-dev gcc

      - name: Set pyproject.toml version from release tag
        run: |
          uv version "${GITHUB_REF##*/}"

      - name: Install python
        run: uv python install

      - name: build
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package
          path: dist/
          retention-days: 7
          if-no-files-found: error

  pypi:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
        name: gha
        url: https://pypi.org/project/jenkinsapi/
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          # github.com:443                        - Git operations / Actions
          # api.github.com:443                    - GitHub API
          # int.api.stepsecurity.io:443           - harden-runner telemetry
          # objects.githubusercontent.com:443     - Download build artifact from prior job
          # upload.pypi.org:443                   - PyPI package upload endpoint
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            int.api.stepsecurity.io:443
            objects.githubusercontent.com:443
            upload.pypi.org:443

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package
          path: dist

      - name: Show dist contents
        run: find dist/ -type f | sort

      - name: Publish
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          attestations: true

  asset:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          # github.com:443                        - Git operations / Actions
          # api.github.com:443                    - GitHub API
          # int.api.stepsecurity.io:443           - harden-runner telemetry
          # objects.githubusercontent.com:443     - Download build artifact from prior job
          # uploads.github.com:443               - GitHub release asset upload endpoint
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            int.api.stepsecurity.io:443
            objects.githubusercontent.com:443
            uploads.github.com:443

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package
          path: dist

      - name: Show dist contents
        run: find dist/ -type f | sort

      - name: Add release asset
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/*
