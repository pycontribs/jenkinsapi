name: Docker System Tests

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4am UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jenkinsapi
    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Harden Runner
      uses: ./.github/actions/harden-runner
      with:
        extra-endpoints: |
          ghcr.io:443
          pkg-containers.githubusercontent.com:443

    - name: Calculate image version
      id: version
      run: |
        HASH=$(sha256sum docker/Dockerfile docker/plugins.txt | sha256sum | cut -c1-8)
        echo "version=$HASH" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build Docker image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: docker
        push: false
        load: true
        tags: jenkinsapi-systest:latest

  systests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jenkinsapi

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Harden Runner
      uses: ./.github/actions/harden-runner
      with:
        extra-endpoints: |
          azure.archive.ubuntu.com:80
          esm.ubuntu.com:443
          files.pythonhosted.org:443
          motd.ubuntu.com:443
          packages.microsoft.com:443
          ppa.launchpadcontent.net:443
          pypi.org:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443

    - name: Setup Python
      uses: ./.github/actions/setup-python
      with:
        python-version: "3.13"

    - name: Log in to GHCR
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run system tests
      run: |
        NUM_WORKERS=auto
        echo "Running docker-backed tests with xdist mode '$NUM_WORKERS' ($(nproc) CPUs available)"
        uv run pytest jenkinsapi_tests/unittests/test_docker_jenkins.py jenkinsapi_tests/systests/ -n $NUM_WORKERS --timeout=120 -v
