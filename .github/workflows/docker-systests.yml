name: Docker System Tests

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Dockerfile'
      - 'jenkinsapi_tests/systests/plugins.txt'
      - 'jenkinsapi/**'
      - 'jenkinsapi_tests/systests/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'Dockerfile'
      - 'jenkinsapi_tests/systests/plugins.txt'
      - 'jenkinsapi/**'
      - 'jenkinsapi_tests/systests/**'
  schedule:
    - cron: '0 4 * * *'  # Daily at 4am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  systests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        python-version: "3.13"

    - name: Install python
      run: uv python install

    - name: Install dependencies
      run: |
        sudo apt-get update; sudo apt-get install libkrb5-dev gcc

    - name: Build Docker image
      run: docker build -t jenkinsapi-systest:latest .

    - name: Run system tests
      run: |
        NUM_WORKERS=$(python3 -c "import os; print(max(1, os.cpu_count() // 3))")
        echo "Running systests with $NUM_WORKERS workers ($(nproc) CPUs available)"
        uv run pytest jenkinsapi_tests/systests/ -n $NUM_WORKERS -v
