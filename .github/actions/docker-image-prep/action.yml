name: Docker Image Prep
description: Calculate image hash from Dockerfile and plugins.txt, then pull from registry or build locally.

inputs:
  image_name:
    description: Full image name prefix (e.g. ghcr.io/owner/jenkinsapi)
    required: true

runs:
  using: composite
  steps:
    - name: Pull or build Docker image
      shell: bash
      run: |
        HASH=$(sha256sum docker/Dockerfile docker/plugins.txt | sha256sum | cut -c1-8)
        IMAGE="${{ inputs.image_name }}:${HASH}"
        if docker pull "$IMAGE" 2>/dev/null; then
          echo "Cache hit: $IMAGE"
          docker tag "$IMAGE" jenkinsapi-systest:latest
        else
          echo "Cache miss — building locally"
          docker build -t jenkinsapi-systest:latest docker/
        fi
