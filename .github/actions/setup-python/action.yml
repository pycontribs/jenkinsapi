name: Setup Python
description: Checkout, install uv, install Python, and install system dependencies

inputs:
  python-version:
    description: Python version to install (optional, passed to setup-uv)
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        python-version: ${{ inputs.python-version }}

    - run: uv python install
      shell: bash

    - run: sudo apt-get update && sudo apt-get install -y libkrb5-dev gcc
      shell: bash
