name: Setup Python
description: Install uv, Python, and system dependencies (requires prior checkout)

inputs:
  python-version:
    description: Python version to install (optional, passed to setup-uv)
    default: ''

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        python-version: ${{ inputs.python-version }}

    - run: uv python install
      shell: bash

    - run: sudo apt-get update && sudo apt-get install -y libkrb5-dev gcc
      shell: bash
