name: Harden Runner
description: Configure step-security/harden-runner with base endpoints and optional extras

inputs:
  extra-endpoints:
    description: Additional allowed endpoints (newline-separated host:port)
    default: ''

runs:
  using: composite
  steps:
    - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit
        allowed-endpoints: |
          github.com:443
          api.github.com:443
          int.api.stepsecurity.io:443
          objects.githubusercontent.com:443
          ${{ inputs.extra-endpoints }}
